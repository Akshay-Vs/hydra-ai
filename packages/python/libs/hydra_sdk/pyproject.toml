[project]
name = "hydra_sdk"
version = "0.1.4"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "dotenv>=0.9.9",
    "fastapi>=0.116.1",
    "httpx>=0.28.1",
    "hydra-types",
    "psutils>=3.3.11",
    "pydantic>=2.11.7",
]

[tool.uv.sources]
hydra-types = { path = "../types", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hydra_sdk"]
include = [
    "hydra_sdk/**",
    "README.md",
    "py.typed",
]
